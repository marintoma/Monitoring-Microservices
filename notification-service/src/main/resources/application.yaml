spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://localhost:5434/notifications
    username: monitoring
    password: monitoring
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: localhost
    port: 5672
    username: monitoring
    password: monitoring

rabbitmq:
  exchange: monitoring.topic
  routing-key: metric.ingested
  queue: metric.ingested.queue

server:
  port: 8084

management:
  endpoints:
    web:
      base-path: /manage
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always