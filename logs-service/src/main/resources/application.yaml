spring:
  application:
    name: logs-service
  datasource:
    url: jdbc:postgresql://localhost:5433/logs
    username: monitoring
    password: monitoring
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8082

app:
  batch:
    max-size: 1000

management:
  endpoints:
    web:
      base-path: /manage
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always